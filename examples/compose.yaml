# Local Development Environment — Verified Client IP
#
# Provides WordPress + proxy chains for testing the plugin.
#
# Usage (Podman preferred):
#   podman compose up -d
#   podman compose down
#
# Or with Docker:
#   docker compose up -d
#   docker compose down
#
# Ports:
#   8100  — WordPress (direct)
#   8101  — Proxy A (RFC 7239 Forwarded) → WordPress
#   8102  — Proxy B (RFC 7239 Forwarded) → Proxy A
#   8103  — Proxy C (RFC 7239 Forwarded) → Proxy B
#   8112  — X-Forwarded-For proxy → Proxy A
#   8122  — Cloudflare-sim proxy → Proxy A
#   8180  — noVNC Linux desktop (for IPv6 browser testing)
#
# IPv6 is enabled on the network.  The RFC 7239 chain (8101–8103) uses
# IPv6 addresses between hops.

services:
  # -----------------------------------------------------------------
  # WordPress + MariaDB
  # -----------------------------------------------------------------
  db:
    image: docker.io/library/mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: rootpass
      MARIADB_DATABASE: wordpress
      MARIADB_USER: wpuser
      MARIADB_PASSWORD: wppass
    volumes:
      - db_data:/var/lib/mysql
    networks:
      vcip_net:

  wordpress:
    image: docker.io/library/wordpress:6.7-php8.3-apache
    depends_on:
      - db
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: wpuser
      WORDPRESS_DB_PASSWORD: wppass
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DEBUG: "1"
    ports:
      - "8100:80"
    volumes:
      - wp_data:/var/www/html
      # Mount the plugin source into the plugins directory.
      - ./:/var/www/html/wp-content/plugins/verified-client-ip:ro
    networks:
      vcip_net:

  # -----------------------------------------------------------------
  # RFC 7239 Forwarded proxy chain (ports 8101–8103)
  # Uses IPv6 between hops where possible.
  # -----------------------------------------------------------------
  proxy-a:
    image: docker.io/library/caddy:2-alpine
    depends_on:
      - wordpress
    ports:
      - "8101:80"
    volumes:
      - ./examples/proxy-a/Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      vcip_net:

  proxy-b:
    image: docker.io/library/caddy:2-alpine
    depends_on:
      - proxy-a
    ports:
      - "8102:80"
    volumes:
      - ./examples/proxy-b/Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      vcip_net:

  proxy-c:
    image: docker.io/library/caddy:2-alpine
    depends_on:
      - proxy-b
    ports:
      - "8103:80"
    volumes:
      - ./examples/proxy-c/Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      vcip_net:

  # -----------------------------------------------------------------
  # X-Forwarded-For proxy (port 8112)
  # -----------------------------------------------------------------
  proxy-xff:
    image: docker.io/library/caddy:2-alpine
    depends_on:
      - proxy-a
    ports:
      - "8112:80"
    volumes:
      - ./examples/proxy-xff/Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      vcip_net:

  # -----------------------------------------------------------------
  # Cloudflare-sim proxy (port 8122)
  # -----------------------------------------------------------------
  proxy-cf:
    image: docker.io/library/caddy:2-alpine
    depends_on:
      - proxy-a
    ports:
      - "8122:80"
    volumes:
      - ./examples/proxy-cf/Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      vcip_net:

  # -----------------------------------------------------------------
  # noVNC Linux desktop for IPv6 browser testing (port 8180)
  # -----------------------------------------------------------------
  desktop:
    image: docker.io/theasp/novnc:latest
    ports:
      - "8180:8080"
    environment:
      DISPLAY_WIDTH: 1280
      DISPLAY_HEIGHT: 720
    networks:
      vcip_net:

# -------------------------------------------------------------------
# Network with IPv6 enabled
# -------------------------------------------------------------------
networks:
  vcip_net:
    driver: bridge
    enable_ipv6: true
    ipam:
      config:
        - subnet: 172.28.0.0/16
        - subnet: fd12:3456:789a::/48

volumes:
  db_data:
  wp_data:
