# Local Development Environment — Verified Client IP
#
# Provides WordPress + proxy chains for testing the plugin.
#
# Usage (Podman preferred):
#   podman compose up -d
#   podman compose down
#
# Or with Docker:
#   docker compose up -d
#   docker compose down
#
# Ports:
#   8100  — WordPress (direct)
#   8101  — Proxy A (RFC 7239 Forwarded) → WordPress
#   8102  — Proxy B (RFC 7239 Forwarded) → Proxy A
#   8103  — Proxy C (RFC 7239 Forwarded) → Proxy B
#   8112  — X-Forwarded-For proxy → Proxy A
#   8122  — Cloudflare-sim proxy → Proxy A
#   8180  — noVNC Linux desktop (for IPv6 browser testing)
#
# IPv6 is enabled on the network.  The RFC 7239 chain (8101–8103) uses
# IPv6 addresses between hops.
#
# Fixed IP addresses follow the port number convention:
#   IPv4: 10.72.39.<last-digits-of-port>   e.g. port 8101 → 10.72.39.101
#   IPv6: fd00:72:39::<last-digits-of-port> e.g. port 8101 → fd00:72:39::101
# (The suffix is written in decimal for readability, not hex compatibility.)

services:
  # -----------------------------------------------------------------
  # WordPress + MariaDB
  # -----------------------------------------------------------------
  db:
    image: docker.io/library/mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: rootpass
      MARIADB_DATABASE: wordpress
      MARIADB_USER: wpuser
      MARIADB_PASSWORD: wppass
    volumes:
      - db_data:/var/lib/mysql
    networks:
      default:
        ipv4_address: 10.72.39.10
        ipv6_address: fd00:72:39::10

  wordpress:
    image: docker.io/library/wordpress:6.7-php8.3-apache
    depends_on:
      - db
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: wpuser
      WORDPRESS_DB_PASSWORD: wppass
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DEBUG: "1"
      # Dynamic site URL so WordPress stays on whatever proxy port was used.
      # WP_HOME / WP_SITEURL constants override the database-stored values.
      # $$ produces a literal $ in Compose (prevents variable substitution).
      WORDPRESS_CONFIG_EXTRA: |
        if ( isset( $$_SERVER['HTTP_HOST'] ) ) {
            define( 'WP_HOME', 'http://' . $$_SERVER['HTTP_HOST'] );
            define( 'WP_SITEURL', 'http://' . $$_SERVER['HTTP_HOST'] );
        }
    ports:
      - "8100:80"
    volumes:
      - wp_data:/var/www/html
      # Mount the plugin source into the plugins directory.
      - ../../build/verified-client-ip:/var/www/html/wp-content/plugins/verified-client-ip:ro
      # Disable mod_remoteip so Apache does not pre-resolve REMOTE_ADDR from
      # X-Forwarded-For before PHP runs.  Without this the plugin becomes a
      # no-op because REMOTE_ADDR is already the client IP by the time PHP
      # sees it.  See examples/wp-client-ip/README.md for details.
      - ./wordpress-apache/disable-remoteip.conf:/etc/apache2/conf-enabled/remoteip.conf:ro
    networks:
      default:
        ipv4_address: 10.72.39.100
        ipv6_address: fd00:72:39::100

  # -----------------------------------------------------------------
  # RFC 7239 Forwarded proxy chain (ports 8101–8103)
  # Uses IPv6 between hops where possible.
  # -----------------------------------------------------------------
  proxy-a:
    image: docker.io/library/caddy:2-alpine
    depends_on:
      - wordpress
    ports:
      - "8101:80"
    volumes:
      - ./proxy-a/Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      default:
        ipv4_address: 10.72.39.101
        ipv6_address: fd00:72:39::101

  proxy-b:
    image: docker.io/library/caddy:2-alpine
    depends_on:
      - proxy-a
    ports:
      - "8102:80"
    volumes:
      - ./proxy-b/Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      default:
        ipv4_address: 10.72.39.102
        ipv6_address: fd00:72:39::102

  proxy-c:
    image: docker.io/library/caddy:2-alpine
    depends_on:
      - proxy-b
    ports:
      - "8103:80"
    volumes:
      - ./proxy-c/Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      default:
        ipv4_address: 10.72.39.103
        ipv6_address: fd00:72:39::103

  # -----------------------------------------------------------------
  # X-Forwarded-For proxy (port 8112)
  # -----------------------------------------------------------------
  proxy-xff:
    image: docker.io/library/caddy:2-alpine
    depends_on:
      - proxy-a
    ports:
      - "8112:80"
    volumes:
      - ./proxy-xff/Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      default:
        ipv4_address: 10.72.39.112
        ipv6_address: fd00:72:39::112

  # -----------------------------------------------------------------
  # Cloudflare-sim proxy (port 8122)
  # -----------------------------------------------------------------
  proxy-cf:
    image: docker.io/library/caddy:2-alpine
    depends_on:
      - proxy-a
    ports:
      - "8122:80"
    volumes:
      - ./proxy-cf/Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      default:
        ipv4_address: 10.72.39.122
        ipv6_address: fd00:72:39::122

  # -----------------------------------------------------------------
  # noVNC Linux desktop for IPv6 browser testing (port 8180)
  # -----------------------------------------------------------------
  desktop:
    image: docker.io/theasp/novnc:latest
    ports:
      - "8180:8080"
    environment:
      DISPLAY_WIDTH: 1280
      DISPLAY_HEIGHT: 720
    networks:
      default:
        ipv4_address: 10.72.39.180
        ipv6_address: fd00:72:39::180

# -------------------------------------------------------------------
# Network with IPv6 enabled
# -------------------------------------------------------------------
networks:
  default:
    enable_ipv6: true
    ipam:
      config:
        - subnet: 10.72.39.0/24
        - subnet: fd00:72:39::/48

volumes:
  db_data:
  wp_data:
