# Disable mod_remoteip so that REMOTE_ADDR is the true TCP peer address.
#
# The WordPress Docker image enables mod_remoteip by default and trusts all
# RFC 1918 ranges.  This causes Apache to pre-resolve the client IP from
# X-Forwarded-For before PHP runs, which means the Verified Client IP plugin
# receives an already-resolved REMOTE_ADDR and becomes a no-op.
#
# By clearing RemoteIPHeader we prevent mod_remoteip from modifying
# REMOTE_ADDR, allowing the plugin to perform its own verified resolution.

RemoteIPHeader X-No-Such-Header
