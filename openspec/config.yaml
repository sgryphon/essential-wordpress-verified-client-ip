schema: spec-driven

# Project context (optional)
# This is shown to AI when creating artifacts.
# Add your tech stack, conventions, style guides, domain knowledge, etc.
# Example:
context: |
  Language: PHP 8.1+, WordPress 6.4+
  Testing: Behat/Gherkin BDD for new tests (`composer test:bdd`, warning: may take 70s+ to execute, so be patient and don't assume it failed); existing PHPUnit tests remain (`composer test`)
  Analysis: PHPStan, `composer analyse`
  Formatter: PHP_CodeSniffer (PHPCS) with WordPress Coding Standards (WPCS) — `WordPress-Core` standard, `composer format-check`
  CI: GitHub Actions

